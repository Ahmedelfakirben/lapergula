<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  
  <!-- Optimización iOS / Android -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#2B2D39" />
  
  <meta name="description" content="Menu digital - La Pergola" />
  <title>La Pergola — Menu</title>
  
  <!-- Favicon SVG (Letra P dorada) -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%232B2D39'/><text x='50' y='72' font-family='Georgia, serif' font-size='60' font-style='italic' font-weight='bold' fill='%23EFDF9C' text-anchor='middle'>P</text></svg>" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
  <!-- GSAP y TextPlugin -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/TextPlugin.min.js"></script>
</head>
<body>

  <!-- ══════════════════════════════════════════════════════════════════
       FONDO ANIMADO
  ══════════════════════════════════════════════════════════════════ -->
  <canvas id="particle-canvas" aria-hidden="true"></canvas>
  
  <div class="glow-bg" aria-hidden="true">
    <div class="glow-orb orb-1"></div>
    <div class="glow-orb orb-2"></div>
    <div class="glow-orb orb-3"></div>
  </div>

  <!-- ══════════════════════════════════════════════════════════════════
       PANTALLA DE CARGA (SPLASH)
  ══════════════════════════════════════════════════════════════════ -->
  <section id="splash" class="splash" aria-label="Écran de chargement">
    <div class="splash-grid"></div>
    <div class="scanlines"></div>
    
    <!-- Anillos de radar -->
    <div class="radar-rings">
      <div class="radar-ring r1"></div>
      <div class="radar-ring r2"></div>
      <div class="radar-ring r3"></div>
    </div>

    <!-- SVG Ornamento Animado -->
    <svg class="splash-ornament" viewBox="0 0 100 100" fill="none" stroke="currentColor">
      <rect class="orn-frame" x="5" y="5" width="90" height="90" stroke="rgba(1,159,162,0.4)" stroke-width="0.5" stroke-dasharray="360" stroke-dashoffset="360" />
      <circle class="orn-circle" cx="50" cy="50" r="40" stroke="rgba(239,223,156,0.3)" stroke-width="0.5" stroke-dasharray="252" stroke-dashoffset="252" />
      <path class="orn-corner" d="M5,15 L5,5 L15,5" stroke="var(--c-teal)" stroke-width="1.5" stroke-dasharray="20" stroke-dashoffset="20" />
      <path class="orn-corner" d="M95,15 L95,5 L85,5" stroke="var(--c-teal)" stroke-width="1.5" stroke-dasharray="20" stroke-dashoffset="20" />
      <path class="orn-corner" d="M5,85 L5,95 L15,95" stroke="var(--c-teal)" stroke-width="1.5" stroke-dasharray="20" stroke-dashoffset="20" />
      <path class="orn-corner" d="M95,85 L95,95 L85,95" stroke="var(--c-teal)" stroke-width="1.5" stroke-dasharray="20" stroke-dashoffset="20" />
      <line class="orn-line" x1="50" y1="10" x2="50" y2="25" stroke="var(--c-gold)" stroke-width="1" stroke-dasharray="15" stroke-dashoffset="15" />
      <line class="orn-line" x1="50" y1="90" x2="50" y2="75" stroke="var(--c-gold)" stroke-width="1" stroke-dasharray="15" stroke-dashoffset="15" />
      <line class="orn-line" x1="10" y1="50" x2="25" y2="50" stroke="var(--c-gold)" stroke-width="1" stroke-dasharray="15" stroke-dashoffset="15" />
      <line class="orn-line" x1="90" y1="50" x2="75" y2="50" stroke="var(--c-gold)" stroke-width="1" stroke-dasharray="15" stroke-dashoffset="15" />
      
      <!-- Diamantes (aparecen por opacidad) -->
      <polygon class="orn-diamond" points="50,2 52,5 50,8 48,5" fill="var(--c-teal)" opacity="0" />
      <polygon class="orn-diamond" points="50,98 52,95 50,92 48,95" fill="var(--c-teal)" opacity="0" />
      <polygon class="orn-diamond" points="2,50 5,48 8,50 5,52" fill="var(--c-teal)" opacity="0" />
      <polygon class="orn-diamond" points="98,50 95,48 92,50 95,52" fill="var(--c-teal)" opacity="0" />
    </svg>

    <div class="splash-content">
      <h1 class="splash-title" id="splash-title"></h1>

      <div class="splash-loader" id="splash-loader">
        <div class="loader-bar" id="loader-bar"></div>
        <div class="loader-dots">
          <span></span><span></span><span></span>
        </div>
      </div>
    </div>
  </section>

  <!-- ══════════════════════════════════════════════════════════════════
       PANTALLA PRINCIPAL (LANDING)
  ══════════════════════════════════════════════════════════════════ -->
  <main id="landing" class="screen">
    
    <div class="landing-content">
      
      <!-- Header -->
      <header class="logo-wrap">
        <div class="logo-ring r-outer"></div>
        <div class="logo-ring r-inner"></div>
        <div class="logo-inner">
          <span class="logo-tagline" id="logo-tagline">Restaurant</span>
          <h1 class="logo-title" id="logo-title">La Pergola</h1>
          <div class="logo-divider" id="logo-divider">
            <span class="divider-line"></span>
            <span class="divider-gem">◆</span>
            <span class="divider-line"></span>
          </div>
          <span class="logo-subtitle" id="logo-subtitle">Cabo Negro</span>
        </div>
      </header>

      <p class="landing-intro" id="landing-intro">
        Sélectionnez une option pour consulter notre carte
      </p>

      <!-- Tarjetas -->
      <div class="menu-cards" role="navigation" aria-label="Sections du menu">
        <button id="btn-breakfast" class="menu-card" onclick="openMenu('breakfast')" aria-label="Voir les petits déjeuners" style="--bg-img: url('image/bg-breakfast.png');">
          <div class="card-shine" aria-hidden="true"></div>
          <div class="card-glow" aria-hidden="true"></div>
          <div class="card-icon" aria-hidden="true">
            <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="32" cy="38" r="18"/>
              <path d="M14 38 Q32 20 50 38"/>
              <path d="M26 14 L26 22"/><path d="M32 12 L32 22"/><path d="M38 14 L38 22"/>
            </svg>
          </div>
          <span class="card-label">Petits Déjeuners</span>
          <span class="card-sub">Voir le menu</span>
          <div class="card-arrow" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" xmlns="http://www.w3.org/2000/svg"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
          </div>
        </button>

        <button id="btn-main" class="menu-card card-featured" onclick="openMenu('main')" aria-label="Voir le menu principal" style="--bg-img: url('image/bg-main.png');">
          <div class="card-shine" aria-hidden="true"></div>
          <div class="card-glow" aria-hidden="true"></div>
          <div class="card-icon" aria-hidden="true">
            <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <ellipse cx="32" cy="40" rx="22" ry="8"/>
              <path d="M10 40 L10 46 Q10 54 32 54 Q54 54 54 46 L54 40"/>
              <path d="M20 32 L20 40"/><path d="M44 32 L44 40"/>
              <path d="M10 32 Q10 24 32 24 Q54 24 54 32"/>
              <path d="M32 24 L32 16"/><path d="M28 16 Q32 10 36 16"/>
            </svg>
          </div>
          <span class="card-label">Menu Principal</span>
          <span class="card-sub">Explorer la carte complète</span>
          <div class="card-arrow" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" xmlns="http://www.w3.org/2000/svg"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
          </div>
        </button>
      </div>

      <!-- Footer -->
      <footer class="landing-footer" id="landing-footer">
        <a href="qr.html" class="qr-link" aria-label="Voir le code QR">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" xmlns="http://www.w3.org/2000/svg">
            <rect x="3" y="3" width="7" height="7"/>
            <rect x="14" y="3" width="7" height="7"/>
            <rect x="14" y="14" width="7" height="7"/>
            <rect x="3" y="14" width="7" height="7"/>
          </svg>
          <span>Afficher le code QR</span>
        </a>
      </footer>

    </div>

    <!-- Ornamentos decorativos del Landing -->
    <svg class="ornament top" viewBox="0 0 200 40" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M100 5 L100 35 M0 20 Q50 20 100 5 Q150 20 200 20" stroke="rgba(239,223,156,0.3)" stroke-width="1"/>
      <circle cx="100" cy="20" r="3" fill="var(--c-teal)"/>
    </svg>
    <svg class="ornament bottom" viewBox="0 0 200 40" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M100 35 L100 5 M0 20 Q50 20 100 35 Q150 20 200 20" stroke="rgba(239,223,156,0.3)" stroke-width="1"/>
      <circle cx="100" cy="20" r="3" fill="var(--c-teal)"/>
    </svg>
  </main>

  <!-- ══════════════════════════════════════════════════════════════════
       VISOR DEL MENÚ
  ══════════════════════════════════════════════════════════════════ -->
  <section id="viewer" class="screen" aria-label="Visionneuse de menu">
    <header class="viewer-header">
      <button id="btn-back" class="btn-back logo-back" onclick="closeMenu()" aria-label="Retour à l'accueil">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
        <span class="logo-text">La Pergola</span>
      </button>
      <div class="viewer-title-wrap">
        <span id="viewer-title" class="viewer-title"></span>
      </div>
      <div id="page-indicator" class="page-indicator" aria-live="polite">
        <span id="current-page">1</span><span class="pi-sep">/</span><span id="total-pages">1</span>
      </div>
    </header>

    <div class="carousel-wrap" id="carousel-wrap">
      <div class="carousel" id="carousel" role="region" aria-label="Pages du menu"></div>
      <button id="btn-prev" class="nav-btn nav-prev" onclick="prevPage()" aria-label="Page précédente">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <button id="btn-next" class="nav-btn nav-next" onclick="nextPage()" aria-label="Page suivante">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M9 18l6-6-6-6"/></svg>
      </button>
    </div>

    <div class="thumbnail-bar" id="thumbnail-bar" role="tablist" aria-label="Miniatures"></div>
  </section>

  <script src="app.js"></script>
</body>
</html>
